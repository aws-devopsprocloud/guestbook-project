apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-project 
  namespace: argocd 
spec: 
  project: default 
  source:
    repoURL: https://github.com/aws-devopsprocloud/guestbook-project.git
    targetRevision: HEAD 
    path: app
  destination: 
    server: https://kubernetes.default.svc
    namespace: guestbook 
  syncPolicy:
    automated:
      prune: true 

